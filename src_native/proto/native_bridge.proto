// Proto schema for native code communication.
// This file is the single source of truth for both C# and TypeScript types.
//
// Generate TS types: npm run proto:generate
// Generate C# types: dotnet build (auto-runs protoc via MSBuild target)
//

syntax = "proto3";

package native_bridge;

// ============================================================================
// Request messages (caller -> native bridge via stdin)
// ============================================================================

// Unified request envelope sent via stdin.
// The command name is still passed as a CLI argument for discoverability;
// this message carries structured parameters for commands that need them.
message CliRequest {
    oneof params {
        ContactExportParams contact_export = 10;
        CalendarExportParams calendar_export = 11;
    }
}

// Parameters for contact export command.
message ContactExportParams {
    // Optional: specific folder name to export from (empty = default contacts folder)
    string folder_name = 1;
}

// Parameters for calendar export command.
message CalendarExportParams {
    int64 start_date = 1;   // UTC ticks — start of export range
    int64 end_date = 2;     // UTC ticks — end of export range
    bool include_private = 3;
    // Optional: specific calendar folder name (empty = default calendar)
    string calendar_folder = 4;
}

// ============================================================================
// Response messages (native bridge -> caller via stdout)
// ============================================================================

// Export result containing vCard data
message ExportResult {

    oneof export_data {
        // Echo test
        string echo = 1;
        // VCard Data
        VCardData vcards = 2;
        string merged_vcards = 3;
        // iCalendar data
        CalendarData calendar = 4;
    }
}

message VCardData {
    // List of vCards generated by some backend
    repeated string vcards = 1;
}

// Calendar export result containing iCalendar event data
message CalendarData {
    // Full iCalendar string (VCALENDAR with VEVENT components)
    string ical = 1;
    // Number of events in the export
    int32 event_count = 2;
}

// CLI response wrapper
message CliResponse {
    bool success = 1;
    string error_message = 2;
    string error_stack_trace = 3;
    string command = 4;
    int64 timestamp = 5;  // UTC ticks

    // Export result when command returns data
    ExportResult export_result = 10;

    // Simple string result for commands like ping, list-commands
    string simple_result = 20;
}
